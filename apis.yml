    name: Confluent Schema Registry REST API
    description: >-
      RESTful API for managing schemas, subjects, versions, and compatibility
      settings. Supports Avro, JSON Schema, and Protobuf schema types with
      configurable compatibility levels and schema references.
    humanURL: https://docs.confluent.io/platform/current/schema-registry/develop/api.html
