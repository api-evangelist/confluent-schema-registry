aid: confluent-schema-registry
name: Confluent Schema Registry
description: >-
  Confluent Schema Registry provides a serving layer for metadata,
  offering a RESTful interface for storing and retrieving Avro, JSON
  Schema, and Protobuf schemas, enabling schema evolution and
  compatibility management for Apache Kafka-based streaming data
  pipelines.
