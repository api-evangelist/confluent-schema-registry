apis:
  - aid: confluent-schema-registry:schema-registry-rest-api
    name: Confluent Schema Registry REST API
    description: >-
      The Confluent Schema Registry REST API provides programmatic management
      of schemas, subjects, schema versions, schema references, compatibility
      modes, and operating mode. Producers and consumers use it to register
      and look up Avro, JSON Schema, and Protobuf schemas, while platform
      teams use it to enforce schema evolution policies through subject- and
      cluster-level compatibility settings. The API uses the
      application/vnd.schemaregistry.v1+json content type and supports
      authentication via HTTP Basic, mTLS, or OAuth depending on deployment.
    humanURL: https://docs.confluent.io/platform/current/schema-registry/develop/api.html
    baseURL: http://localhost:8081
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    tags:
      - Compatibility
      - REST
      - Schemas
      - Subjects
