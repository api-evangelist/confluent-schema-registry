aid: confluent-schema-registry
name: Confluent Schema Registry
description: >-
  Confluent Schema Registry is the open-source serving layer for schema
  metadata used in Apache Kafka data pipelines. It exposes a RESTful interface
  for storing and retrieving Avro, JSON Schema, and Protobuf schemas, manages
  schema evolution through configurable compatibility rules (BACKWARD,
  FORWARD, FULL, and transitive variants), supports schema references and
  contexts, and integrates with Kafka producers and consumers via shipped
  serializers and deserializers. Schema Registry is distributed under the
  Confluent Community License and is a core component of both Confluent
  Platform and Confluent Cloud.
